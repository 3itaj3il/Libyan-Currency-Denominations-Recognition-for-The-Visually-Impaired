<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كاشف العملات الليبية</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0d1f15; color: #e8f5ee; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 32px 16px; }
        .container { width: 100%; max-width: 540px; display: flex; flex-direction: column; gap: 24px; }
        .header { text-align: center; }
        .header h1 { color: #f0b957; font-size: 26px; }
        .upload-area { background: #122a1c; border: 2px dashed #2a5a3a; border-radius: 16px; padding: 32px; text-align: center; cursor: pointer; position: relative; }
        .upload-area input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
        .preview-container { display: none; margin-top: 10px; border-radius: 14px; overflow: hidden; }
        .preview-container.show { display: block; }
        .preview-container img { width: 100%; height: 220px; object-fit: cover; }
        .detect-btn { width: 100%; background: linear-gradient(135deg, #1a7a4a, #2da865); color: white; border: none; border-radius: 14px; padding: 18px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .detect-btn:disabled { opacity: 0.6; }
        .result-card { display: none; background: #122a1c; border: 1px solid #2a5a3a; border-radius: 16px; padding: 20px; animation: fadeUp 0.4s; }
        .result-card.show { display: block; }
        .currency-name { font-size: 32px; color: #f0b957; margin-bottom: 10px; }
        .speak-btn { width: 100%; background: transparent; border: 2px solid #c8963e; color: #f0b957; border-radius: 12px; padding: 14px; font-weight: bold; cursor: pointer; font-size: 15px; }
        @keyframes fadeUp { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }
    </style>
</head>
<body>

<!-- وسم الصوت الترحيبي المضاف داخل الـ body -->
<audio id="instructionAudio" src="/static/audio/intro.mp3"></audio>

<div class="container">
    <div class="header">
        <h1>💵 كاشف العملات الليبية</h1>
        <p>ارفع صورة للورقة النقدية للتعرف عليها</p>
    </div>

    <div class="upload-area">
        <input type="file" accept="image/*" onchange="loadFile(this)">
        <div style="font-size: 40px;">📷</div>
        <h3>ارفع صورة العملة</h3>
    </div>

    <div class="preview-container" id="previewContainer">
        <img id="previewImg" src="">
    </div>

    <button class="detect-btn" id="detectBtn" onclick="detect()" disabled>🔍 تعرف على العملة</button>

    <div class="result-card" id="resultCard">
        <h3>نتيجة الفحص:</h3>
        <div class="currency-name" id="currencyName">—</div>
        <div id="confidenceText" style="color: #8bbfa0; margin-bottom: 15px;"></div>
        <button class="speak-btn" id="speakBtn" onclick="playAudio()">🔊 اسمع النتيجة</button>
    </div>
</div>

<script>
let selectedFile = null;
let currentAudioFile = "";

// كود تشغيل الصوت الترحيبي تلقائياً عند تحميل الصفحة
window.onload = function() {
    const introAudio = document.getElementById('instructionAudio');
    
    introAudio.play().catch(function(error) {
        console.log("المتصفح منع الصوت التلقائي، سيشتغل عند أول ضغطة للمستخدم.");
        
        // خطة بديلة: إذا منع المتصفح الصوت، يشتغل فوراً عند أول ضغطة في أي مكان بالصفحة
        document.addEventListener('click', function() {
            introAudio.play();
        }, { once: true });
    });
};

function loadFile(input) {
    const file = input.files[0];
    if (!file) return;
    selectedFile = file;
    const reader = new FileReader();
    reader.onload = e => {
        document.getElementById('previewImg').src = e.target.result;
        document.getElementById('previewContainer').classList.add('show');
        document.getElementById('detectBtn').disabled = false;
        document.getElementById('resultCard').classList.remove('show');
    };
    reader.readAsDataURL(file);
}

async function detect() {
    const btn = document.getElementById('detectBtn');
    btn.disabled = true;
    btn.textContent = '⏳ ...';

    const formData = new FormData();
    formData.append('image', selectedFile);

    try {
        const res = await fetch('/predict', { method: 'POST', body: formData });
        const data = await res.json();

        document.getElementById('currencyName').textContent = data.class;
        document.getElementById('confidenceText').textContent = `نسبة الثقة: ${data.confidence}%`;
        currentAudioFile = data.audio;

        document.getElementById('resultCard').classList.add('show');
    } catch (err) {
        alert("Error connecting to server");
    } finally {
        btn.disabled = false;
        btn.textContent = '🔍 تعرف على العملة';
    }
}

function playAudio() {
    if (!currentAudioFile) return;
    const btn = document.getElementById('speakBtn');
    const audio = new Audio(`/static/audio/${currentAudioFile}`);

    btn.textContent = '⏳ ...';
    audio.play();

    audio.onended = () => {
        btn.textContent = '🔊 اسمع النتيجة';
    };
}
</script>
</body>
</html>
